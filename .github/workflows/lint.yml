name: Lint

on:
  pull_request:

permissions:
  contents: read

jobs:
  rubocop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Install RuboCop
        run: gem install rubocop -v 1.87.0 --no-document

      - name: Run RuboCop
        run: rubocop
