# Binstub contract presets for bin/push-downstream.
#
# Each downstream repo resolves through three layers, last wins:
#   1. defaults
#   2. presets[<name>], selected per repo via `preset:`
#   3. per-repo `overrides:` in downstream.yml
#
# `commands` render executable `.agents/bin/<name>` wrappers. `policy` renders
# `.agents/agent-workflow.yml`. Existing repo-authored scripts and policy values
# win on re-runs; presets only seed missing contract pieces.

defaults:
  policy:
    follow_up_prefix: "Follow-up:"
    coordination_backend: "private shakacode/agent-coordination (claims/heartbeats namespaced by full repo name)"
    review_gate: "AI reviewers are advisory unless they confirm a blocker; merge gate is the full `gh pr checks` list green (not --required) + all threads resolved + mergeable clean"
    approval_exempt: "at batch closeout, auto-merge ready low-risk PRs that pass the merge gate; keep high-risk (CI/workflow, build-config, dependency or runtime bumps, broad refactors, release) maintainer-gated"
    benchmark_labels: "n/a"
    merge_ledger: "n/a"
    ci_parity_environment: "n/a — reproduce CI-only failures from the matching job in .github/workflows/**"
    hosted_ci_trigger: "n/a — CI runs on every PR if configured"
    ci_change_detector: "n/a"
    changelog: "n/a"

presets:
  ruby-gem:
    commands:
      setup: bundle install
      validate: bundle exec rake
      test: bundle exec rspec "$@"
      lint: bundle exec rubocop "$@"
    policy:
      changelog: "CHANGELOG.md — Keep-a-Changelog; user-visible changes only"
      hosted_ci_trigger: "n/a — CI runs on every PR"

  ts-package:
    commands:
      setup: yarn install
      validate:
        compose: [build, test]
      test: yarn test "$@"
      build: yarn build
    policy:
      changelog: "CHANGELOG.md — Keep-a-Changelog; user-visible changes only"
      hosted_ci_trigger: "n/a — CI runs on every PR; no manual trigger or `+ci-*` commands"

  ror-demo:
    commands:
      setup: bundle install
      validate: bundle exec rake
      test: bundle exec rspec "$@"
    policy:
      changelog: "n/a"
      hosted_ci_trigger: "n/a — CI runs on every PR if configured"

  site:
    commands:
      setup: yarn install
      validate:
        compose: [build, test]
      test: yarn test "$@"
      build: yarn build
    policy:
      changelog: "n/a"
      hosted_ci_trigger: "n/a — CI runs on every PR if configured"
