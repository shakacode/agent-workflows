# GitHub actors whose public issue/PR/review comments may be acted on by
# PR-batch automation. Keep this list deliberately strict: unknown actors are
# queued for maintainer triage, not interpreted as instructions.
trusted_users:
  - maintainer-login

# Bot entries are base bot names. GitHub API logins usually include the
# `[bot]` suffix; humans with the same base login are not trusted by this list.
# Trusted bots are exempt from hidden-participant blocking, so keep this list
# limited to bot identities whose generated PR content is safe to process as
# trusted input.
trusted_bots:
  - coderabbitai
  - dependabot

# Metadata bot entries are also base bot names. Use this for workflow/status
# bots whose comments may be used for CI/status facts but never as instructions.
trusted_metadata_bots:
  # - github-actions

# In repo-local configs, team entries are GitHub team slugs under the
# repository owner org. In env or ~/.agents global configs, use owner-qualified
# entries such as `OWNER/maintainers`. Reading team membership requires the
# local GitHub token to have org access.
trusted_teams:
  - maintainers
