# Minimal consumer-repo policy for portable agent workflows.
# Replace n/a values with repo-specific policy as each workflow is adopted.
---
base_branch: main
# Optional: override the deterministic repository-name prefix used in batch
# titles and thread handles. Use 1-6 uppercase ASCII letters or digits.
# repo_prefix: "APP"
follow_up_prefix: "Follow-up:"
review_gate: "n/a"
approval_exempt: "n/a"
coordination_backend: "n/a"
changelog: "n/a"
benchmark_labels: "n/a"
merge_ledger: "n/a"
ci_parity_environment: "n/a"
hosted_ci_trigger: "n/a"
ci_change_detector: "n/a"

# Optional: enable the untrusted-contributor-intake skill with an explicit
# trusted-base authority. Replace OWNER/REPO before uncommenting; the seam
# doctor validates the complete mapping and the skill fails closed if omitted.
# untrusted_contributor_intake:
#   trusted_github_host: "github.com"
#   trusted_github_scheme: "https"
#   trusted_github_repo: "OWNER/REPO"
