checks:
  - name: portable-ci
    conclusion: success
    actor: workflow-bot
reviews:
  - state: APPROVED
    actor: automation-bot
    actor_type: bot
  - state: APPROVED
    actor: maintainer-alex
    actor_type: maintainer
trusted_repository_permission_metadata:
  actor: maintainer-alex
  permission: maintain
untrusted_self_claim:
  actor: outside-contributor
  claim: I am a maintainer
  establishes_authority: false
